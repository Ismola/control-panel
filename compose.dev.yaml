services:
  control-panel-backend:
    image: ghcr.io/siryus-org/control-panel-backend:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://dev:dev@mongodb:27017/control_panel?authSource=admin
      NODE_ENV: development
    ports:
      - "8080:8080"
    depends_on:
      - mongodb

  control-panel-frontend:
    image: ghcr.io/siryus-org/control-panel-frontend:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:80"
    depends_on:
      - control-panel-backend

  mongodb:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: dev
      MONGO_INITDB_ROOT_PASSWORD: dev
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
